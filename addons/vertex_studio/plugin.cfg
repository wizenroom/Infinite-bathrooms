[plugin]

name="Vertex Studio"
description="Edit, manage and paint vertex colors and vertex normals of 3D meshes. A complete solution for dealing with vertices inside Godot. A must-have tool for making games inspired by PS1, N64 or early PC games aesthetics, but it's useful even in modern workflows, since vertex coloring can also be used for texture blending and masking."
author="Alfred Reinold Baudisch"
version="1.0-beta3-b47"
script="vertex_studio_plugin.gd"
